name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: '**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout
      - uses: actions/setup-node
      - uses: actions/cache
      - uses: actions/upload-artifact
      - uses: actions/download-artifact

  test:
    runs-on: ubuntu-latest
    steps:
      - Run frontend tests
      - Run backend tests
      - Upload coverage reports

  deploy:
    runs-on: ubuntu-latest
    needs:
      steps:
      - Build frontend
      - Build backend
      - Deploy to production

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
      types: [opened, synchronize ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      - docker
    steps:
      - uses: actions/checkout
      - name: Install dependencies
        run: cd backend && npm ci
      - name: Run tests
        run: npm test
      - name: Upload coverage
        uses: actions/upload-artifact@v3
        with:
          name: backend-coverage
          path: ./backend/coverage

  test-frontend:
    runs-on: ubuntu-latest
    needs:
      - uses: actions/checkout
    steps:
      - uses: actions/setup-node
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Run tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Upload coverage
        uses: actions/upload-artifact@v3
        with:
          name: frontend-coverage
          path: ./frontend/coverage

  deploy:
    runs-on: ubuntu-latest
    needs:
      - uses: actions/checkout
    steps:
      - name: Build and push Docker image
        run: |
          docker build -t hifz-companion:latest .
          docker push -t ${{ secrets.DOCKER_PASSWORD }} ${{ secrets.DOCKER_USERNAME }}/hifz-registry

